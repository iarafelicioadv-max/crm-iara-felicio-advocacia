<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Envio de Documentos — Iara Vieira Felício Advocacia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  body { background: var(--bg); }
  .envio-wrap { max-width: 640px; margin: 0 auto; padding: 40px 20px 80px; }
  .envio-header { text-align: center; margin-bottom: 28px; }
  .envio-header img { width: 64px; height: 64px; background: var(--creme); border-radius: 14px; padding: 8px; margin-bottom: 14px; }
  .envio-header h1 { font-family: 'Playfair Display', serif; font-size: 20px; margin: 0 0 4px; color: var(--bordo); }
  .envio-header p { color: var(--text-light); font-size: 14px; margin: 0; }
  .envio-intro { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; margin-bottom: 24px; font-size: 14px; line-height: 1.6; }
  .envio-footer { text-align: center; margin-top: 28px; }
  .envio-footer .btn-primary { width: 100%; padding: 14px; font-size: 15px; }
  .envio-sucesso { text-align: center; padding: 60px 20px; }
  .envio-sucesso h2 { font-family: 'Playfair Display', serif; color: var(--bordo); }
</style>
</head>
<body>
<div class="envio-wrap">
  <div class="envio-header">
    <img src="logo.png" alt="Iara Vieira Felício" />
    <h1>Envio de Documentos</h1>
    <p>Iara Vieira Felício — Advocacia &amp; Consultoria Jurídica</p>
  </div>

  <div id="conteudo">
    <div class="envio-intro" id="intro">Carregando...</div>
  </div>
</div>
<script src="enviar-documentos.js"></script>
</body>
</html>
